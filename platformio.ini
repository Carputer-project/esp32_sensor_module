; PlatformIO Project Configuration
; ESP32 Analog Sensor Module for Car ECU (no CAN)

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino

monitor_speed  = 115200
upload_speed   = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -std=gnu++17

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
